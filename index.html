<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>SWF con Loader Personalizzato</title>

<style>
body {
  margin:0;
  background:#111;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.frame {
  width: 90vw;
  max-width: 1000px;
  aspect-ratio: 4 / 3;
  background:#000;
  border:10px solid #444;
  border-radius:20px;
  position:relative;
  overflow:hidden;
}

#ruffle-container {
  width:100%;
  height:100%;
}

#loader {
  position:absolute;
  inset:0;
  background:url("loader.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  color:white;
  font-family:Arial;
  background-color:black;
}

.fade-out {
  opacity:0;
  transition:opacity 0.5s ease;
}
</style>
</head>

<body>

<div class="frame">
  <div id="ruffle-container"></div>
  <div id="loader">0%</div>
</div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
window.addEventListener("load", () => {

  const loader = document.getElementById("loader");

  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    autoplay: "on",
    letterbox: "on"
  };

  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();
  document.getElementById("ruffle-container").appendChild(player);

  player.style.width = "100%";
  player.style.height = "100%";

  player.addEventListener("progress", (e) => {
    if (e.detail && e.detail.total > 0) {
      const percent = Math.floor((e.detail.loaded / e.detail.total) * 100);
      loader.textContent = percent + "%";
    }
  });

  player.addEventListener("loadedmetadata", () => {
    loader.classList.add("fade-out");
    setTimeout(() => loader.remove(), 500);
  });

  player.load("vrml3.swf");
});
</script>

</body>
</html>
