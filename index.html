<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Il mio SWF</title>

<style>
body {
  margin:0;
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

#container {
  width: 95vw;
  max-width: 1200px;
  aspect-ratio: 4 / 3;
  position:relative;
  overflow:hidden;
}

#ruffle-container {
  width:100%;
  height:100%;
}

#loader {
  position:absolute;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:32px;
  color:white;
  font-family:Arial, sans-serif;
  transition:opacity 0.5s ease;
}

.fade-out {
  opacity:0;
}
</style>
</head>

<body>

<div id="container">
  <div id="ruffle-container"></div>
  <div id="loader">Caricamento...</div>
</div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
window.addEventListener("load", () => {

  // Config PRIMA di creare il player
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    autoplay: "on",
    unmuteOverlay: "hidden",   // rimuove popup audio
    letterbox: "on"
  };

  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();
  const container = document.getElementById("ruffle-container");

  container.appendChild(player);
  player.style.width = "100%";
  player.style.height = "100%";

  const loader = document.getElementById("loader");

  // Quando l'SWF è pronto
  player.addEventListener("loadedmetadata", () => {
    loader.classList.add("fade-out");
    setTimeout(() => loader.remove(), 500);
  });

  player.load("Maze.swf");
});
</script>

</body>
</html>
