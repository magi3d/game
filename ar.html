<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR - Asso di Picche</title>
  
  <!-- A-Frame core -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  
  <!-- AR.js (ultima versione stabile consigliata al 2025) -->
  <script src="https://cdn.jsdelivr.net/npm/arjs@latest/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden; background: black;">

  <a-scene 
    embedded 
    vr-mode-ui="enabled: false"
    arjs="
      sourceType: webcam;
      debugUIEnabled: false;
      detectionMode: mono_and_matrix;
      matrixCodeType: 3x3;
      patternRatio: 0.80;
      trackingMethod: best;
      warmupTolerance: 5;
      stabilizationTolerance: 10;
    ">

    <!-- Marker con il pattern personalizzato -->
    <a-marker 
      type="pattern" 
      url="pattern-ace.patt"
      preset="custom">

      <!-- Cubo rosso rotante -->
      <a-box 
        position="0 0.5 0" 
        scale="0.8 0.8 0.8"
        material="color: #c8102e; opacity: 0.9; metalness: 0.1; roughness: 0.7;"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
      </a-box>

      <!-- Testo "ASSO DI PICCHE" -->
      <a-text 
        value="ASSO DI PICCHE" 
        color="white" 
        align="center" 
        width="2.4"
        position="0 1.4 0" 
        rotation="-90 0 0"
        material="color: black; emissive: #111111;">
      </a-text>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
