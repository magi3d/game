<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/arjs@3.4.3/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: true; patternRatio: 0.80; trackingMethod: best;">
    
    <a-marker type="pattern" url="marker.patt">
      <a-box position="0 0.5 0" color="red" scale="1 1 1"></a-box>
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
