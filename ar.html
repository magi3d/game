<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Marker Test</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/arjs@latest/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:#000;">

  <a-scene 
    embedded 
    vr-mode-ui="enabled: false"
    arjs="
      sourceType: webcam;
      debugUIEnabled: false;
      detectionMode: mono;
      trackingMethod: best;
      patternRatio: 0.80;
      warmupTolerance: 5;
      stabilizationTolerance: 10;
    ">

    <a-marker 
      type="pattern" 
      url="marker.patt">

      <a-box 
        position="0 0.5 0" 
        scale="0.8 0.8 0.8"
        material="color: #FFD700; opacity: 0.9;"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
      </a-box>

      <a-text 
        value="MARKER RILEVATO" 
        color="white" 
        align="center" 
        width="3.2"
        position="0 1.3 0" 
        rotation="-90 0 0">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
