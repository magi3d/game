<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* FIX SCHERMO NERO: Forza la scena a tutto schermo */
        .a-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; position: absolute !important; }
    </style>
</head>
<body>
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" 
        embedded 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="video.mp4" preload="auto" loop="true" crossorigin="anonymous" muted playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-video src="#vid" width="1" height="1.3" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#vid');
        const target = document.querySelector('#target');

        // SBLOCCO MANUALE (Huawei richiede un tocco per caricare il video in AR)
        window.addEventListener('click', () => {
            video.play();
            console.log("Video sbloccato");
        }, { once: true });

        target.addEventListener("targetFound", () => {
            console.log("Trovato!");
            video.play();
        });

        target.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
