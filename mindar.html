<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Image Tracking - Carmine</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        /* Schermata di caricamento personalizzata se vuoi */
        #loading-screen {
            position: absolute; z-index: 999; width: 100%; height: 100%;
            background: #222; display: flex; justify-content: center; align-items: center;
            color: white; font-family: sans-serif;
        }
    </style>
</head>

<body>
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets timeout="30000">
            <video id="arVideo" 
                   src="video.mp4" 
                   preload="auto" 
                   loop="true" 
                   crossorigin="anonymous" 
                   muted 
                   playsinline 
                   webkit-playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-video src="#arVideo" 
                     width="1" 
                     height="1.25" 
                     position="0 0 0" 
                     rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        // Gestione degli eventi per far partire il video su Huawei/Android
        const targetEntity = document.querySelector('#target');
        const video = document.querySelector('#arVideo');

        // Quando il marker viene trovato
        targetEntity.addEventListener("targetFound", event => {
            console.log("Target trovato!");
            video.play();
        });

        // Quando il marker viene perso
        targetEntity.addEventListener("targetLost", event => {
            console.log("Target perso");
            video.pause();
        });

        // Trucco per i browser mobili: il video parte solo dopo il primo tocco dell'utente
        window.addEventListener('click', () => {
            video.play();
            // Lo mettiamo in pausa subito se il target non è ancora visibile
            // Questo "sblocca" il permesso del browser per l'autoplay
            if (!targetEntity.visible) {
                video.pause();
            }
        }, { once: true });
    </script>
</body>
</html>
